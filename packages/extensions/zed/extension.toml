id = "localcode"
name = "LocalCode"
description = "The open source coding agent."
version = "1.3.2"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/anomalyco/localcode"

[agent_servers.localcode]
name = "LocalCode"
icon = "./icons/localcode.svg"

[agent_servers.localcode.targets.darwin-aarch64]
archive = "https://github.com/anomalyco/localcode/releases/download/v1.3.2/localcode-darwin-arm64.zip"
cmd = "./localcode"
args = ["acp"]

[agent_servers.localcode.targets.darwin-x86_64]
archive = "https://github.com/anomalyco/localcode/releases/download/v1.3.2/localcode-darwin-x64.zip"
cmd = "./localcode"
args = ["acp"]

[agent_servers.localcode.targets.linux-aarch64]
archive = "https://github.com/anomalyco/localcode/releases/download/v1.3.2/localcode-linux-arm64.tar.gz"
cmd = "./localcode"
args = ["acp"]

[agent_servers.localcode.targets.linux-x86_64]
archive = "https://github.com/anomalyco/localcode/releases/download/v1.3.2/localcode-linux-x64.tar.gz"
cmd = "./localcode"
args = ["acp"]

[agent_servers.localcode.targets.windows-x86_64]
archive = "https://github.com/anomalyco/localcode/releases/download/v1.3.2/localcode-windows-x64.zip"
cmd = "./localcode.exe"
args = ["acp"]
